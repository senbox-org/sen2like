name: Lint

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -f Dockerfile.github -t sen2like-lint .

    - name: Run linting tools in Docker
      run: |
        docker run sen2like-lint bash -c "
          echo '=== Running Black check (warning only) ===' &&
          (black --check --diff --line-length=120 . || echo '::warning::Black check failed') &&
          echo '=== Running isort check (warning only) ===' &&
          (isort --check --diff --profile black . || echo '::warning::isort check failed') &&
          echo '=== Running Flake8 (warning only) ===' &&
          (flake8 --max-line-length=120 --statistics . || echo '::warning::Flake8 check failed') &&
          echo '=== Running Bandit (mandatory) ===' &&
          bandit -r --severity-level high . &&
          echo '=== Running Pylint (warning only) ===' &&
          (pylint --extension-pkg-whitelist=numpy,cv2 --max-line-length=120 -j 1 sen2like/**/*.py || echo '::warning::Pylint check failed')
        "